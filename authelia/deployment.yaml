apiVersion: apps/v1
kind: Deployment
metadata:
  name: authelia
  namespace: authelia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authelia
  template:
    metadata:
      labels:
        app: authelia
    spec:
      enableServiceLinks: false
      initContainers:
        - name: copy-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - cp /tmp/config/configuration.yml /tmp/users/users.yml /config/ && chmod 0600 /config/users.yml
          volumeMounts:
            - name: config-source
              mountPath: /tmp/config
            - name: users-source
              mountPath: /tmp/users
            - name: config
              mountPath: /config
      containers:
        - name: authelia
          image: authelia/authelia:4.39.20
          ports:
            - containerPort: 9091
              name: http
          volumeMounts:
            - name: config
              mountPath: /config
          env:
            - name: TZ
              value: "Asia/Ho_Chi_Minh"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config-source
          configMap:
            name: authelia-config
        - name: users-source
          secret:
            secretName: authelia-users
        - name: config
          emptyDir: {}
