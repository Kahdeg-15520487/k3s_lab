# SPF-MMO Next.js frontend
apiVersion: apps/v1
kind: Deployment

metadata:
  name: spf-mmo-client
  namespace: spf-mmo
  labels:
    app: spf-mmo-client
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: spf-mmo-client
  template:
    metadata:
      labels:
        app: spf-mmo-client
    spec:
      containers:
      - name: client
        image: ghcr.io/kahdeg-15520487/spf-client:latest
        ports:
        - containerPort: 13112
        env:
        - name: PORT
          value: "13112"
        - name: NEXT_PUBLIC_API_URL
          value: ""
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: spf-mmo-client
  namespace: spf-mmo
spec:
  selector:
    app: spf-mmo-client
  ports:
  - port: 13112
    targetPort: 13112
---
# IngressRoute: proxies /api and /socket.io to server, everything else to client
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: spf-mmo
  namespace: spf-mmo
spec:
  entryPoints:
  - websecure
  routes:
  # WebSocket for Socket.IO — must come before /api to match first
  - match: Host(`spf.minhnguyenle.net`) && PathPrefix(`/socket.io/`)
    kind: Rule
    services:
    - name: spf-mmo-server
      port: 13110
  # API routes
  - match: Host(`spf.minhnguyenle.net`) && PathPrefix(`/api/`)
    kind: Rule
    services:
    - name: spf-mmo-server
      port: 13110
  # Everything else → frontend
  - match: Host(`spf.minhnguyenle.net`)
    kind: Rule
    services:
    - name: spf-mmo-client
      port: 13112
