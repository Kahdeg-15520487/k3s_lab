# HTTPS ingress for Headlamp
apiVersion: traefik.io/v1alpha1
kind: IngressRoute

metadata:
  namespace: kube-system
  name: headlamp
spec:
  entryPoints:
  - websecure
  routes:
  - match: Host(`headlamp.minhnguyenle.net`)
    kind: Rule
    services:
    - name: headlamp
      kind: Service
      port: 80
    middlewares:
    - name: authelia-forwardauth
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  namespace: kube-system
  name: authelia-forwardauth
spec:
  forwardAuth:
    address: http://authelia.authelia.svc.homelab.cluster:9091/api/authz/forward-auth
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Email
      - Remote-Name